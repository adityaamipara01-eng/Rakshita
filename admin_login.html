<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakshika — Admin Portal Login</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: radial-gradient(circle at 50% 50%, #0c1220 0%, #05070a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text-primary);
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.08) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      bottom: -150px;
      right: -150px;
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      z-index: 10;
    }

    .login-card {
      background: rgba(16, 22, 34, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      box-shadow: var(--shadow-lg), 0 0 30px rgba(99, 102, 241, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-md);
      color: var(--primary);
      margin-bottom: 16px;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
    }

    .login-title {
      font-size: 1.75rem;
      font-family: var(--font-display);
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      background: rgba(8, 11, 17, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-sm);
      padding: 12px 12px 12px 40px;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: var(--font-body);
      transition: all var(--transition-fast);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
      background: rgba(8, 11, 17, 0.95);
    }

    .forgot-link {
      position: absolute;
      right: 0;
      top: 0;
      font-size: 0.75rem;
      color: var(--secondary);
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .role-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .role-btn {
      background: rgba(8, 11, 17, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 8px 4px;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: center;
    }

    .role-btn.active {
      background: rgba(99, 102, 241, 0.1);
      border-color: var(--secondary);
      color: var(--text-primary);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.1);
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      border: none;
      color: white;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      padding: 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.35);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(1px);
    }

    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
      color: #fca5a5;
      padding: 10px 12px;
      font-size: 0.8rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: color var(--transition-fast);
    }

    .back-home:hover {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div style="display:flex; justify-content:center; margin-bottom: 16px;">
          <a href="index.html">
            <img src="assets/logo.png" alt="Rakshika Logo" style="height: 48px; width: auto; object-fit: contain;">
          </a>
        </div>
        <h1 class="login-title">Control Center</h1>
        <p class="login-subtitle">Admin Command & Control Portal</p>
      </div>

      <div class="error-banner" id="errorBanner">
        <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
        <span id="errorMessage">Invalid credentials</span>
      </div>

      <!-- Dummy hidden fields to trick browser autofill away from real inputs -->
      <input type="text" style="display:none" aria-hidden="true">
      <input type="password" style="display:none" aria-hidden="true">

      <form id="loginForm" onsubmit="handleAdminLogin(event)" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="adminEmailField">Admin Email</label>
          <div class="input-wrapper">
            <i data-lucide="mail" class="input-icon"></i>
            <input type="text" id="adminEmailField" class="form-input" placeholder="admin@rakshika.gov.in" required autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="adminPassField">Password</label>
          <a href="#" class="forgot-link" onclick="forgotPasswordAlert(event)">Forgot?</a>
          <div class="input-wrapper">
            <i data-lucide="lock" class="input-icon"></i>
            <input type="password" id="adminPassField" class="form-input" placeholder="••••••••••••" required autocomplete="new-password">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Simulate Testing Role</label>
          <div class="role-selector" id="roleSelector">
            <div class="role-btn active" data-role="superadmin" onclick="selectRole('superadmin')">Super Admin</div>
            <div class="role-btn" data-role="policeadmin" onclick="selectRole('policeadmin')">Police PCR</div>
            <div class="role-btn" data-role="cyberadmin" onclick="selectRole('cyberadmin')">Cyber Crime</div>
          </div>
        </div>

        <button type="submit" class="btn-login">
          Secure Login <i data-lucide="arrow-right" style="width:18px;height:18px;"></i>
        </button>
      </form>
    </div>

    <a href="index.html" class="back-home">
      <i data-lucide="home" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;"></i>Back to Homepage
    </a>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js?v=7"></script>
  <script src="js/auth.js?v=7"></script>
  
  <script>
    lucide.createIcons();

    let selectedRole = 'superadmin';

    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-role') === role);
      });
    }

    function forgotPasswordAlert(e) {
      e.preventDefault();
      alert("Forgot Password? Mock reset link requested. Use seeded credentials for testing:\nEmail: adityaamipara@gmail.com\nPassword: Aditya@01022008");
    }

    async function handleAdminLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('adminEmailField').value.trim();
      const password = document.getElementById('adminPassField').value;
      const errorBanner = document.getElementById('errorBanner');
      const errorMessage = document.getElementById('errorMessage');

      errorBanner.style.display = 'none';

      if (!window.rakshikaAuth) {
        showError("Authentication service unavailable.");
        return;
      }

      // Check credentials
      // Future Supabase auth would run:
      // const res = await window.rakshikaAuth.login(email, password, selectedRole);
      // But for mock convenience and user request, we validate adityaamipara@gmail.com / Aditya@01022008
      const isMockCredential = (email === 'adityaamipara@gmail.com' && password === 'Aditya@01022008');
      
 if (isMockCredential) {

const sessionUser = {
name: selectedRole === 'superadmin'
? 'Super Admin Aditya'
: (selectedRole === 'policeadmin'
? 'PCR Officer Aditya'
: 'Cyber Agent Aditya'),
email: email,
role: selectedRole
};

sessionStorage.setItem('rakshika_session', JSON.stringify(sessionUser));
sessionStorage.setItem('rak_role', selectedRole);

if (selectedRole === 'superadmin') {
window.location.href = 'admin.html';
}
else if (selectedRole === 'policeadmin') {
window.location.href = 'police.html';
}
else if (selectedRole === 'cyberadmin') {
window.location.href = 'cyberdashboard.html';
}
}
else {
        // Fallback checks standard mock DB
        const res = await window.rakshikaAuth.login(email, password, selectedRole === 'superadmin' ? 'superadmin' : (selectedRole === 'policeadmin' ? 'police' : 'cyber'));
        if (res.success) {
          sessionStorage.setItem('rak_role', selectedRole);
          window.location.href = 'admin.html';
        } else {
          showError(res.message || "Invalid Admin Email or Password for selected role.");
        }
      }
    }

    function showError(msg) {
      const errorBanner = document.getElementById('errorBanner');
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = msg;
      errorBanner.style.display = 'flex';
      
      // Vibrate if mobile
      try { navigator.vibrate && navigator.vibrate([100]); } catch(err) {}
    }
  </script>
</body>
</html>
